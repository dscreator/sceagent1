<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hello World App</title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #f9fafb, #e5eefb);
      }

      .card {
        padding: 2rem 2.5rem;
        border-radius: 14px;
        background: #ffffff;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        text-align: center;
      }

      h1 {
        margin: 0;
        color: #1f2937;
        letter-spacing: 0.3px;
      }

      p {
        margin-top: 0.75rem;
        color: #4b5563;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Hello, World!</h1>
      <p>Your app is running.</p>
    </main>
  </body>
</html>
